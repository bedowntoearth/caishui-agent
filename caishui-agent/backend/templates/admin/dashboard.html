<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财税智能体系统 - 数据总览</title>
    <style>
        :root { --primary:#4361ee; --primary-dark:#3a0ca3; --success:#2ecc71; --warning:#f39c12; --danger:#e74c3c; --info:#3498db;
            --sidebar-w:240px; --header-h:60px; --bg:#f4f6fa; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { background:var(--bg); display:flex; min-height:100vh; }

        /* Sidebar */
        .sidebar { width:var(--sidebar-w); background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%); color:#fff; position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; transition:.3s; flex-shrink:0; }
        .sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; gap:10px; }
        .sidebar-logo .icon { font-size:28px; }
        .sidebar-logo span { font-size:17px; font-weight:700; letter-spacing:1px; }
        .nav-item { padding:12px 24px; cursor:pointer; display:flex; align-items:center; gap:10px; color:rgba(255,255,255,.7); transition:.2s; font-size:14px; border-left:3px solid transparent; user-select:none; }
        .nav-item:hover { color:#fff; background:rgba(255,255,255,.06); }
        .nav-item.active { color:#fff; background:rgba(67,97,238,.2); border-left-color:var(--primary); }
        .nav-item i { width:22px; text-align:center; font-size:16px; }
        .nav-section { padding:16px 20px 6px; font-size:11px; color:rgba(255,255,255,.35); text-transform:uppercase; letter-spacing:1.5px; margin-top:8px; }
        .sidebar-bottom { padding:16px 20px; border-top:1px solid rgba(255,255,255,.08); position:absolute; bottom:0; width:100%; }

        /* Main */
        .main-wrap { margin-left:var(--sidebar-w); flex:1; min-width:0; display:flex; flex-direction:column; }
        .header { height:var(--header-h); background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.06); display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:50; }
        .header-left h2 { font-size:18px; color:#333; }
        .header-right { display:flex; align-items:center; gap:18px; }
        .user-info { display:flex; align-items:center; gap:8px; font-size:13px; color:#555; cursor:pointer; }
        .user-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; }

        /* Content */
        .content { padding:28px; flex:1; }

        /* Stat cards */
        .stat-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; margin-bottom:28px; }
        .stat-card { background:#fff; border-radius:14px; padding:22px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
        .stat-card .label { font-size:13px; color:#888; margin-bottom:8px; }
        .stat-card .value { font-size:30px; font-weight:700; color:#1a1a2e; }
        .stat-card .trend { font-size:12px; margin-top:6px; color:#aaa; }
        .stat-card.blue .value{color:var(--info)} .stat-card.green .value{color:var(--success)}
        .stat-card.yellow .value{color:var(--warning)} .stat-card.red .value{color:var(--danger)}

        .card { background:#fff; border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,.04); overflow:hidden; }
        .card-header { padding:18px 24px; border-bottom:1px solid #f0f0f0; font-size:15px; color:#333; font-weight:600; display:flex; align-items:center; justify-content:space-between; }
        .card-body { padding:20px 24px; }

        /* Table */
        table.data-table { width:100%; border-collapse:collapse; }
        table.data-table th { background:#fafafa; padding:11px 14px; text-align:left; font-size:13px; color:#666; font-weight:600; border-bottom:1px solid #eee; white-space:nowrap; }
        table.data-table td { padding:11px 14px; font-size:13.5px; color:#444; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
        table.data-table tr:hover { background:#fcfdff; }
        .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; }
        .badge-green{background:#eafaf1;color:#27ae60} .badge-red{background:#fdedec;color:#e74c3c}
        .badge-yellow{background:#fef9e7;color:#d68910} .badge-blue{background:#ebf5fb;color:#2980b9}
        .empty-state { text-align:center; padding:48px 20px; color:#aaa; }
        .empty-state i { font-size:48px; margin-bottom:12px; display:block; }

        /* Buttons */
        .btn { display:inline-flex; align-items:center; gap:5px; padding:8px 18px; border:none; border-radius:8px; font-size:13px; cursor:pointer; transition:.2s; font-weight:500; white-space:nowrap; text-decoration:none; }
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#3555d9}
        .btn-outline{background:transparent;border:1.5px solid #ddd;color:#555}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
        .btn-sm{padding:5px 12px;font-size:12px}

        /* Toast */
        .toast-container { position:fixed; top:20px; right:20px; z-index:300; }
        .toast { background:#333; color:#fff; padding:12px 20px; border-radius:10px; margin-bottom:8px; font-size:13px; box-shadow:0 4px 15px rgba(0,0,0,.15); animation:toastIn .3s ease; display:flex; align-items:center; gap:8px; }
        .toast.success{background:var(--success)}.toast.error{background:var(--danger)}
        @keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo"><span class="icon">🧾</span><span>财税智能体</span></div>
    <div class="nav-section">📊 核心功能</div>
    <div class="nav-item active" onclick="switchPage('dashboard')"><i>📋</i> 数据总览</div>
    <div class="nav-item" onclick="switchPage('companies')"><i>🏢</i> 企业信息管理</div>
    <div class="nav-item" onclick="switchPage('risk-indicators')"><i>⚠️</i> 风险指标管理</div>
    <div class="nav-section">⚙️ 系统设置</div>
    <div class="nav-item" onclick="location.href='/admin/users'"><i>👥</i> 系统用户管理</div>
    <div class="nav-item" onclick="location.href='/admin/wx-users'"><i>📱</i> 小程序用户管理</div>
    <div class="nav-item" onclick="location.href='/admin/llm-config'"><i>🤖</i> 大模型配置</div>
    <div class="sidebar-bottom">
        <div class="user-info" style="justify-content:space-between;width:100%;">
            <span id="currentUserName">管理员</span>
            <button class="btn btn-outline btn-sm" style="padding:3px 10px;" onclick="doLogout()">退出登录</button>
        </div>
    </div>
</div>

<!-- Main -->
<div class="main-wrap">
    <div class="header">
        <div class="header-left"><h2>数据总览</h2></div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <span id="headerUserName">管理员</span>
            </div>
        </div>
    </div>

    <div class="content">
        <!-- Stat Cards -->
        <div class="stat-cards" id="statCards">
            <div class="stat-card blue"><div class="label">📊 企业总数</div><div class="value" id="totalCompanies">--</div><div class="trend">已录入风险数据的企业</div></div>
            <div class="stat-card red"><div class="label">🔴 重大风险</div><div class="value" id="majorCount">--</div><div class="trend">需重点关注处理</div></div>
            <div class="stat-card yellow"><div class="label">🟡 存在预警</div><div class="value" id="warningCount">--</div><div class="trend">需要持续关注</div></div>
            <div class="stat-card green"><div class="label">🟢 基本正常</div><div class="value" id="normalCount">--</div><div class="trend">无重大风险问题</div></div>
        </div>

        <!-- Charts + High Risk Table: 左右布局 -->
        <div style="display:grid;grid-template-columns:calc((100% - 3*20px)/4) 1fr;gap:20px;margin-bottom:20px;align-items:stretch;">
            <div class="card">
                <div class="card-header">📈 风险等级分布</div>
                <div class="card-body" id="riskChartBody" style="padding:20px 16px;display:flex;flex-direction:column;gap:14px;">
                    <!-- 由 renderRiskChart 动态填充 -->
                </div>
            </div>
            <div class="card" style="display:flex;flex-direction:column;height:100%;">
                <div class="card-header" style="flex-shrink:0;">
                    🔴 高风险企业预警
                    <a href="/admin/companies" class="btn btn-sm btn-outline">查看全部</a>
                </div>
                <div class="card-body" style="padding:0;flex:1;overflow-y:auto;">
                    <table class="data-table" id="highRiskTable">
                        <thead><tr><th>企业名称</th><th>统一社会信用代码</th><th>健康度</th><th>风险项数</th><th>更新时间</th><th>操作</th></tr></thead>
                        <tbody></tbody>
                    </table>
                    <div class="empty-state" id="noHighRisk" style="display:none;"><i>✅</i>暂无高风险企业</div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API = '/api/v1';
const token = localStorage.getItem('access_token') || '';

function authHeaders() { 
    const headers = {'Content-Type': 'application/json'};
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return headers;
}

async function api(url, opts={}) {
    const res = await fetch(API + url, {...opts, headers:{...authHeaders(),...(opts.headers||{})}, credentials:'include'});
    if (res.status === 401) { localStorage.clear(); location.href='/admin/login'; return null; }
    return res;
}

function showToast(msg, type='info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// Page switch (navigation)
async function switchPage(name) {
    if (name !== 'dashboard') {
        location.href = `/admin/${name}`;
    }
}

// Logout
async function doLogout() {
    await api('/auth/logout', {method:'POST'});
    localStorage.clear();
    location.href = '/admin/login';
}

// Auth check
(function() {
    if (!token) { location.href='/admin/login'; return; }
    const ui = JSON.parse(localStorage.getItem('user_info') || '{}');
    const name = ui.real_name || ui.username || '管理员';
    document.getElementById('currentUserName').textContent = name;
    document.getElementById('headerUserName').textContent = name;
    if (ui.real_name) document.getElementById('userAvatar').textContent = ui.real_name.charAt(0).toUpperCase();
    loadDashboard();
})();

// Load dashboard data
async function loadDashboard() {
    try {
        const res = await api('/risk-indicators/overview?page_size=50');
        if (!res) return;
        const data = await res.json();
        const items = (data.data && data.data.items) || [];
        const total = (data.data && data.data.total) || 0;

        // Stats - 计算每个企业的最高风险等级
        let major = 0, warning = 0, remind = 0;
        items.forEach(i => {
            const levels = Object.values(i.risk_levels || {});
            // 风险等级从高到低排序
            if (levels.includes('major_risk')) major++;
            else if (levels.includes('warning')) warning++;
            else if (levels.includes('remind')) remind++;
        });
        const normal = Math.max(0, total - major - warning - remind);
        
        document.getElementById('totalCompanies').textContent = total;
        document.getElementById('majorCount').textContent = major;
        document.getElementById('warningCount').textContent = warning;
        document.getElementById('normalCount').textContent = normal;

        // High risk table
        const highRisk = items.filter(i => Object.values(i.risk_levels || {}).includes('major_risk'));
        renderHighRiskTable(highRisk);

        // Chart
        renderRiskChart({ normal: normal, warn: warning, major: major, total: total });
    } catch(e) { console.error(e); }
}

function renderHighRiskTable(items) {
    const tbody = document.querySelector('#highRiskTable tbody');
    const empty = document.getElementById('noHighRisk');
    if (!items.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = items.map(i => {
        const riskCount = Object.values(i.risk_levels || {}).filter(l => l !== 'normal' && l !== 'undefined').length;
        const scoreColor = i.health_score < 60 ? '#e74c3c' : i.health_score < 75 ? '#e67e22' : '#27ae60';
        return `<tr>
            <td style="font-weight:500">${i.company_name}</td>
            <td style="font-family:monospace;font-size:12px;color:#888">${i.credit_code || '--'}</td>
            <td><b style="color:${scoreColor}">${i.health_score ?? '--'}</b></td>
            <td>${riskCount}项</td>
            <td>${i.updated_at ? new Date(i.updated_at).toLocaleDateString() : '--'}</td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="location.href='/admin/risk-indicators'">详情</button>
                <button class="btn btn-sm" style="border:1.5px solid #e74c3c;color:#e74c3c;background:transparent;padding:4px 10px;border-radius:6px;cursor:pointer;" onclick="deleteIndicator(${i.id}, '${i.company_name.replace(/'/g, "\\'")}')">删除</button>
            </td>
        </tr>`;
    }).join('');
}

let riskChartInstance = null;

function renderRiskChart(dist) {
    const total = (dist.normal || 0) + (dist.warn || 0) + (dist.major || 0);
    const rows = [
        { label: '基本正常', value: dist.normal || 0, color: '#2ecc71', bg: '#eafaf1', textColor: '#27ae60' },
        { label: '存在预警', value: dist.warn || 0,   color: '#f39c12', bg: '#fef9e7', textColor: '#d68910' },
        { label: '重大风险', value: dist.major || 0,  color: '#e74c3c', bg: '#fdedec', textColor: '#c0392b' },
    ];
    const container = document.getElementById('riskChartBody');
    if (!container) return;
    container.innerHTML = rows.map(r => {
        const pct = total > 0 ? Math.round(r.value / total * 100) : 0;
        return `
        <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                <span style="font-size:13px;color:#555;font-weight:500;">${r.label}</span>
                <span style="font-size:13px;font-weight:700;color:${r.textColor};">${r.value} 家 &nbsp;<span style="font-size:11px;color:#aaa;font-weight:400;">${pct}%</span></span>
            </div>
            <div style="background:#f0f0f0;border-radius:6px;height:12px;overflow:hidden;">
                <div style="width:${pct}%;background:${r.color};height:100%;border-radius:6px;transition:width .5s ease;min-width:${r.value>0?'4px':'0'};"></div>
            </div>
        </div>`;
    }).join('');

    // 底部总计
    container.innerHTML += `
        <div style="border-top:1px solid #f0f0f0;padding-top:12px;margin-top:2px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;color:#888;">合计企业数</span>
            <span style="font-size:18px;font-weight:700;color:#333;">${total}</span>
        </div>`;
}

async function deleteIndicator(id, companyName) {
    if (!confirm(`确定要删除「${companyName}」的风险指标数据吗？此操作不可恢复。`)) return;
    const res = await api(`/risk-indicators/${id}`, { method: 'DELETE' });
    if (!res) return;
    const data = await res.json();
    if (data.code === 200) {
        showToast('删除成功', 'success');
        loadDashboard();
    } else {
        showToast(data.message || '删除失败', 'error');
    }
}
</script>
</body>
</html>
