<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财税智能体系统 - 系统用户管理</title>
    <style>
        :root { --primary:#4361ee; --primary-dark:#3a0ca3; --success:#2ecc71; --warning:#f39c12; --danger:#e74c3c; --info:#3498db;
            --sidebar-w:240px; --header-h:60px; --bg:#f4f6fa; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { background:var(--bg); display:flex; min-height:100vh; }
        .sidebar { width:var(--sidebar-w); background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%); color:#fff; position:fixed; top:0; left:0; height:100vh; overflow-y:auto; z-index:100; transition:.3s; flex-shrink:0; }
        .sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; gap:10px; }
        .sidebar-logo .icon { font-size:28px; }
        .sidebar-logo span { font-size:17px; font-weight:700; letter-spacing:1px; }
        .nav-item { padding:12px 24px; cursor:pointer; display:flex; align-items:center; gap:10px; color:rgba(255,255,255,.7); transition:.2s; font-size:14px; border-left:3px solid transparent; user-select:none; }
        .nav-item:hover { color:#fff; background:rgba(255,255,255,.06); }
        .nav-item.active { color:#fff; background:rgba(67,97,238,.2); border-left-color:var(--primary); }
        .nav-item i { width:22px; text-align:center; font-size:16px; }
        .nav-section { padding:16px 20px 6px; font-size:11px; color:rgba(255,255,255,.35); text-transform:uppercase; letter-spacing:1.5px; margin-top:8px; }
        .sidebar-bottom { padding:16px 20px; border-top:1px solid rgba(255,255,255,.08); position:absolute; bottom:0; width:100%; }
        .main-wrap { margin-left:var(--sidebar-w); flex:1; min-width:0; display:flex; flex-direction:column; }
        .header { height:var(--header-h); background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.06); display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:50; }
        .header-left h2 { font-size:18px; color:#333; }
        .header-right { display:flex; align-items:center; gap:18px; }
        .user-info { display:flex; align-items:center; gap:8px; font-size:13px; color:#555; cursor:pointer; }
        .user-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; }
        .content { padding:28px; flex:1; }
        .card { background:#fff; border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,.04); overflow:hidden; margin-bottom:20px; }
        .card-header { padding:18px 24px; border-bottom:1px solid #f0f0f0; font-size:15px; color:#333; font-weight:600; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
        .card-body { padding:20px 24px; }
        .card-body.p-0 { padding:0; }
        .card-footer { padding:14px 24px; border-top:1px solid #f0f0f0; background:#fafafa; display:flex; justify-content:space-between; align-items:center; }
        table { width:100%; border-collapse:collapse; }
        th { background:#fafafa; padding:11px 14px; text-align:left; font-size:13px; color:#666; font-weight:600; border-bottom:1px solid #eee; white-space:nowrap; }
        td { padding:11px 14px; font-size:13.5px; color:#444; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
        tr:hover { background:#fcfdff; }
        .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; }
        .badge-green{background:#eafaf1;color:#27ae60} .badge-red{background:#fdedec;color:#e74c3c}
        .badge-yellow{background:#fef9e7;color:#d68910} .badge-blue{background:#ebf5fb;color:#2980b9}
        .empty-state { text-align:center; padding:48px 20px; color:#aaa; }
        .toast-container { position:fixed; top:20px; right:20px; z-index:300; }
        .toast { background:#333; color:#fff; padding:12px 20px; border-radius:10px; margin-bottom:8px; font-size:13px; box-shadow:0 4px 15px rgba(0,0,0,.15); animation:toastIn .3s ease; }
        .toast.success,.toast-danger,.toast-info,.toast-warning{background:#333;color:#fff}
        .toast.success{background:#27ae60}.toast.danger{background:#e74c3c}.toast.warning{background:#f39c12}.toast.info{background:#3498db}
        @keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        .btn { display:inline-flex; align-items:center; gap:5px; padding:8px 18px; border:none; border-radius:8px; font-size:13px; cursor:pointer; transition:.2s; font-weight:500; white-space:nowrap; text-decoration:none; }
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#3555d9}
        .btn-secondary{background:#e9ecef;color:#495057}.btn-secondary:hover{background:#dee2e6}
        .btn-outline-secondary,.btn-outline-danger,.btn-outline-success{background:transparent;border:1.5px solid #ddd;color:#555;padding:5px 12px;font-size:12px;border-radius:6px;cursor:pointer}
        .btn-outline-secondary:hover{border-color:#6c757d;color:#6c757d}
        .btn-outline-danger:hover{border-color:#e74c3c;color:#e74c3c}
        .form-control,.form-select { padding:7px 12px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:13px; outline:none; transition:.2s; }
        .form-control:focus,.form-select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(67,97,238,.1); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; }
        .modal.show { display:flex; }
        .modal-dialog { background:#fff; border-radius:14px; width:500px; max-width:95vw; max-height:90vh; overflow:auto; }
        .modal-header { padding:18px 24px; border-bottom:1px solid #f0f0f0; display:flex; justify-content:space-between; align-items:center; }
        .modal-body { padding:20px 24px; }
        .modal-footer { padding:14px 24px; border-top:1px solid #f0f0f0; display:flex; justify-content:flex-end; gap:10px; }
        .modal-title { font-size:16px; font-weight:600; }
        .btn-close { background:none; border:none; font-size:20px; cursor:pointer; color:#888; }
        .text-muted{color:#aaa}.text-danger{color:#e74c3c}.small{font-size:12px}
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:#fff; border-radius:14px; width:480px; max-width:95vw; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .modal-header h3 { font-size:18px; margin:0; }
        .close-btn { background:none; border:none; font-size:22px; cursor:pointer; color:#888; }
        .radio-group { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
        .radio-item { padding:12px 16px; border:2px solid #e2e8f0; border-radius:10px; cursor:pointer; transition:.2s; }
        .radio-item:hover { border-color:var(--primary); background:#f5f7ff; }
        .radio-item.selected { border-color:var(--primary); background:#eef1ff; color:var(--primary); }
        .radio-item input[type=radio] { display:none; }
        .radio-item.selected::before { content:'✓ '; font-weight:700; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo"><span class="icon">🧾</span><span>财税智能体</span></div>
    <div class="nav-section">📊 核心功能</div>
    <div class="nav-item" onclick="location.href='/admin/dashboard'"><i>📋</i> 数据总览</div>
    <div class="nav-item" onclick="location.href='/admin/companies'"><i>🏢</i> 企业信息管理</div>
    <div class="nav-item" onclick="location.href='/admin/risk-indicators'"><i>⚠️</i> 风险指标管理</div>
    <div class="nav-section">⚙️ 系统设置</div>
    <div class="nav-item active"><i>👥</i> 系统用户管理</div>
    <div class="nav-item" onclick="location.href='/admin/wx-users'"><i>📱</i> 小程序用户管理</div>
    <div class="nav-item" onclick="location.href='/admin/llm-config'"><i>🤖</i> 大模型配置</div>
    <div class="sidebar-bottom">
        <div class="user-info" style="justify-content:space-between;width:100%;">
            <span id="currentUserName">管理员</span>
            <button class="btn btn-outline-secondary btn-sm" onclick="doLogout()">退出登录</button>
        </div>
    </div>
</div>

<!-- Main -->
<div class="main-wrap">
    <div class="header">
        <div class="header-left"><h2>系统用户管理</h2></div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <span id="headerUserName">管理员</span>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0 fw-semibold">系统用户（管理员账号）</h6>
                <div style="display:flex;gap:10px;align-items:center;">
                    <input id="searchInput" class="form-control" style="width:200px" placeholder="搜索用户名/姓名/手机号" oninput="debounceLoad()">
                    <select id="roleFilter" class="form-select" style="width:130px" onchange="loadUsers()">
                        <option value="">全部角色</option>
                        <option value="super_admin">超级管理员</option>
                        <option value="admin">管理员</option>
                        <option value="operator">运营人员</option>
                        <option value="analyst">分析师</option>
                    </select>
                    <button class="btn btn-outline" onclick="openExportModal()">📥 导出</button>
                    <button class="btn btn-primary" onclick="openAddModal()">➕ 新增用户</button>
                </div>
            </div>
            <div class="card-body p-0">
                <table>
                    <thead>
                        <tr>
                            <th>用户名</th>
                            <th>真实姓名</th>
                            <th>手机号</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>最后登录</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="8" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer">
                <small class="text-muted" id="pageInfo"></small>
                <ul class="pagination mb-0" id="pagination"></ul>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="userModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">新增用户</h5>
                <button type="button" class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div style="margin-bottom:14px;">
                        <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">用户名 <span class="text-danger">*</span></label>
                        <input class="form-control" id="username" required placeholder="登录用户名" style="width:100%;">
                    </div>
                    <div style="margin-bottom:14px;">
                        <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">真实姓名 <span class="text-danger">*</span></label>
                        <input class="form-control" id="realName" required placeholder="真实姓名" style="width:100%;">
                    </div>
                    <div style="margin-bottom:14px;">
                        <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">手机号 <span class="text-danger">*</span></label>
                        <input class="form-control" id="phone" required placeholder="11位手机号" style="width:100%;">
                    </div>
                    <div style="margin-bottom:14px;" id="passwordField">
                        <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">密码 <span class="text-danger">*</span></label>
                        <input class="form-control" id="password" type="password" placeholder="初始密码" style="width:100%;">
                    </div>
                    <div style="margin-bottom:14px;">
                        <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">角色 <span class="text-danger">*</span></label>
                        <select class="form-select" id="roleSelect" style="width:100%;">
                            <option value="operator">运营人员</option>
                            <option value="analyst">分析师</option>
                            <option value="admin">管理员</option>
                            <option value="super_admin">超级管理员</option>
                        </select>
                    </div>
                    <div style="margin-bottom:14px;">
                        <label style="display:block;margin-bottom:4px;font-size:13px;color:#555;">备注</label>
                        <input class="form-control" id="remark" placeholder="备注信息（可选）" style="width:100%;">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>📥 导出数据</h3>
            <button class="close-btn" onclick="document.getElementById('exportModal').classList.remove('show')">✕</button>
        </div>
        <p style="font-size:13px;color:#888;margin-bottom:14px;">请选择导出范围：</p>
        <div class="radio-group" id="exportRadioGroup">
            <div class="radio-item selected" onclick="selectExportOption(this,'filtered')">
                <input type="radio" name="export_scope" value="filtered" checked>
                <span>📋 导出当前筛选结果</span>
            </div>
            <div class="radio-item" onclick="selectExportOption(this,'all')">
                <input type="radio" name="export_scope" value="all">
                <span>🌐 导出全部数据</span>
            </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
            <button class="btn btn-outline" onclick="document.getElementById('exportModal').classList.remove('show')">取消</button>
            <button class="btn btn-primary" onclick="doExport()">确认导出</button>
        </div>
    </div>
</div>

<script>
const API = '/api/v1';
const token = localStorage.getItem('access_token') || '';

function authHeaders() {
    const headers = {'Content-Type': 'application/json'};
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return headers;
}

async function api(url, opts={}) {
    const res = await fetch(API + url, {...opts, headers:{...authHeaders(),...(opts.headers||{})}, credentials:'include'});
    if (res.status === 401) { localStorage.clear(); location.href='/admin/login'; return null; }
    return res;
}

function showToast(msg, type='info') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

function closeModal() { document.getElementById('userModal').classList.remove('show'); }

async function doLogout() {
    await api('/auth/logout', {method:'POST'});
    localStorage.clear();
    location.href='/admin/login';
}

let currentPage = 1;
const pageSize = 15;
let debounceTimer = null;

function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => loadUsers(1), 300);
}

const ROLE_NAMES = {
    'super_admin': '超级管理员',
    'admin': '管理员',
    'operator': '运营人员',
    'analyst': '分析师'
};

async function loadUsers(page = 1) {
    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">加载中...</td></tr>';
    try {
        const keyword = document.getElementById('searchInput').value.trim();
        const role = document.getElementById('roleFilter').value;
        const params = new URLSearchParams({ page, size: pageSize });
        if (keyword) params.set('keyword', keyword);
        if (role) params.set('role', role);
        const res = await api(`/users/sys/list?${params}`);
        if (!res) return;
        const data = await res.json();
        if (data.code !== 200) {
            showToast(data.message || '加载数据失败', 'danger');
            tbody.innerHTML = `<tr><td colspan="8" class="empty-state">加载失败: ${data.message || '未知错误'}</td></tr>`;
            return;
        }
        const { items, total } = data.data;
        currentPage = page;
        document.getElementById('pageInfo').textContent = `共 ${total} 条`;
        if (!items || !items.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无用户数据</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        tbody.innerHTML = items.map(u => `
        <tr>
            <td><b>${u.username || '--'}</b></td>
            <td>${u.real_name || '--'}</td>
            <td>${u.phone || '--'}</td>
            <td>${getRoleBadge(u.role)}</td>
            <td>${u.status === 'active' ? '<span class="badge badge-green">正常</span>' : '<span class="badge badge-red">禁用</span>'}</td>
            <td class="text-muted small">${u.last_login_at ? new Date(u.last_login_at).toLocaleString('zh-CN') : '--'}</td>
            <td class="text-muted small">${(u.created_at||'').slice(0,10)}</td>
            <td>
                <button class="btn-outline-secondary" style="padding:4px 10px;font-size:12px;border:1.5px solid #ddd;border-radius:6px;background:transparent;cursor:pointer;" onclick='editUser(${JSON.stringify(u)})'>编辑</button>
                <button class="btn-outline-danger" style="padding:4px 10px;font-size:12px;border:1.5px solid #e74c3c;color:#e74c3c;border-radius:6px;background:transparent;cursor:pointer;" onclick="deleteUser(${u.id}, '${(u.real_name||u.username||'').replace(/'/g,"\\'")}')">删除</button>
            </td>
        </tr>`).join('');
        renderPagination(total, page);
    } catch (err) {
        console.error('loadUsers error:', err);
        showToast('加载失败: ' + err.message, 'danger');
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state">加载失败，请刷新页面重试<br><small style="color:#999">${err.message}</small></td></tr>`;
    }
}

function getRoleBadge(role) {
    const map = {
        'super_admin': '<span class="badge badge-red">超级管理员</span>',
        'admin': '<span class="badge badge-blue">管理员</span>',
        'operator': '<span class="badge badge-green">运营人员</span>',
        'analyst': '<span class="badge badge-yellow">分析师</span>'
    };
    return map[role] || `<span class="badge badge-green">${ROLE_NAMES[role] || role}</span>`;
}

function renderPagination(total, page) {
    const pages = Math.ceil(total / pageSize);
    const ul = document.getElementById('pagination');
    ul.innerHTML = '';
    for (let i = 1; i <= Math.min(pages, 10); i++) {
        const li = document.createElement('li');
        li.className = `page-item ${i===page?'active':''}`;
        li.innerHTML = `<a class="page-link" href="#" onclick="loadUsers(${i});return false;">${i}</a>`;
        ul.appendChild(li);
    }
}

function openAddModal() {
    document.getElementById('modalTitle').textContent = '新增用户';
    document.getElementById('userId').value = '';
    document.getElementById('username').value = '';
    document.getElementById('username').disabled = false;
    document.getElementById('realName').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('password').value = '';
    document.getElementById('password').required = true;
    document.getElementById('passwordField').style.display = '';
    document.getElementById('remark').value = '';
    document.getElementById('roleSelect').value = 'operator';
    document.getElementById('userModal').classList.add('show');
}

function editUser(user) {
    document.getElementById('modalTitle').textContent = '编辑用户';
    document.getElementById('userId').value = user.id;
    document.getElementById('username').value = user.username || '';
    document.getElementById('username').disabled = true;
    document.getElementById('realName').value = user.real_name || '';
    document.getElementById('phone').value = user.phone || '';
    document.getElementById('password').value = '';
    document.getElementById('password').required = false;
    document.getElementById('passwordField').style.display = 'none';
    document.getElementById('remark').value = user.remark || '';
    document.getElementById('roleSelect').value = user.role || 'operator';
    document.getElementById('userModal').classList.add('show');
}

async function saveUser() {
    const userId = document.getElementById('userId').value;
    const username = document.getElementById('username').value.trim();
    const real_name = document.getElementById('realName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const role = document.getElementById('roleSelect').value;
    const remark = document.getElementById('remark').value.trim();

    if (!username || !real_name || !phone) {
        showToast('请填写必填项', 'warning');
        return;
    }

    let payload = { real_name, phone, role, remark };
    if (!userId && password) {
        payload = { ...payload, username, password };
    }

    try {
        const url = userId ? `/users/sys/${userId}` : '/users/sys';
        const method = userId ? 'PUT' : 'POST';
        const res = await api(url, {
            method,
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.code === 200) {
            showToast(userId ? '更新成功' : '新增成功', 'success');
            closeModal();
            loadUsers(currentPage);
        } else {
            showToast(data.message || data.detail || '操作失败', 'danger');
        }
    } catch (err) {
        showToast('操作失败: ' + err.message, 'danger');
    }
}

async function deleteUser(id, name) {
    if (!confirm(`确定删除用户「${name}」吗？此操作不可恢复。`)) return;
    try {
        const res = await api(`/users/sys/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.code === 200) {
            showToast('删除成功', 'success');
            loadUsers(currentPage);
        } else {
            showToast(data.message || data.detail || '删除失败', 'danger');
        }
    } catch (err) {
        showToast('删除失败: ' + err.message, 'danger');
    }
}

// Export functions
let selectedExportScope = 'filtered';

function selectExportOption(el, scope) {
    selectedExportScope = scope;
    document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected');
}

function openExportModal() {
    selectedExportScope = 'filtered';
    document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('selected'));
    document.querySelector('.radio-item').classList.add('selected');
    document.getElementById('exportModal').classList.add('show');
}

async function doExport() {
    document.getElementById('exportModal').classList.remove('show');
    const keyword = document.getElementById('searchInput').value.trim();
    const role = document.getElementById('roleFilter').value;
    let url = `/users/sys/export?`;
    if (selectedExportScope === 'filtered') {
        if (keyword) url += `keyword=${encodeURIComponent(keyword)}&`;
        if (role) url += `role=${role}&`;
    }
    try {
        const res = await fetch(API + url, { headers: authHeaders() });
        if (!res.ok) throw new Error('导出失败');
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `系统用户_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`;
        a.click();
        showToast('导出成功！', 'success');
    } catch (e) {
        showToast('导出失败：' + e.message, 'danger');
    }
}

// Page init
(function() {
    if (!token) { location.href='/admin/login'; return; }
    const ui = JSON.parse(localStorage.getItem('user_info') || '{}');
    const name = ui.real_name || ui.username || '管理员';
    document.getElementById('currentUserName').textContent = name;
    document.getElementById('headerUserName').textContent = name;
    if (ui.real_name) document.getElementById('userAvatar').textContent = ui.real_name.charAt(0).toUpperCase();
    loadUsers();
})();
</script>
